name: Refresh morning digest

on:
  schedule:
    # ~6 AM Eastern (EDT = 10 UTC, EST = 11 UTC). Offset 5 min to avoid GitHub queue delays.
    - cron: "5 10 * * *"
    - cron: "5 11 * * *"
    # Fallback ~9 AM Eastern if the morning slot was delayed or skipped.
    - cron: "0 13 * * *"
    # Extra fallbacks ~10 AM and ~12 PM Eastern (GitHub schedule is best-effort).
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if digest already shows today (scheduled only)
        id: skip
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run — always building."
            exit 0
          fi
          TODAY=$(TZ=America/New_York date +%Y-%m-%d)
          DIGEST_DATE=$(node -p "JSON.parse(require('fs').readFileSync('data/digest.json','utf8')).date")
          echo "Eastern today: $TODAY | digest date: $DIGEST_DATE"
          if [ "$DIGEST_DATE" = "$TODAY" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Digest already dated $TODAY — nothing to do."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Digest is stale — building."
          fi

      - name: Set up Node
        if: steps.skip.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build digest from RSS
        if: steps.skip.outputs.run == 'true'
        run: |
          npm ci
          npm run build:digest

      - name: Commit and push if digest changed
        if: steps.skip.outputs.run == 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/digest.json; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to digest.json — nothing to commit."
            exit 0
          fi
          git add data/digest.json
          git commit -m "chore: refresh morning digest"
          git pull --rebase origin main
          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Netlify deploy
        if: steps.skip.outputs.run == 'true'
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "::warning::NETLIFY_BUILD_HOOK_URL secret is not set. Add a Netlify build hook URL in repo secrets so deploys run after each refresh."
            exit 0
          fi
          curl -fsS -X POST -d {} "$NETLIFY_BUILD_HOOK"
          echo "Netlify deploy triggered."
